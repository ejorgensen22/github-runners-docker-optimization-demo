name: Integration Tests with Docker Compose (Kafka + Producer)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest  # Use larger runner for better performance: ubuntu-latest-8-cores

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and load services with Bake
        uses: docker/bake-action@v5
        with:
          files: |
            docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run Integration Tests
        run: |
          # Start services and run tests
          docker compose up --build=false --exit-code-from producer --abort-on-container-exit
          echo "Integration tests completed successfully!"